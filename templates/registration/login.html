{% extends "base.html" %}
{% block title %}Sign in | bputnotes Dashboard{% endblock %}
{% block content %}
<section class="mx-auto flex min-h-[80vh] max-w-md items-center">
    <div class="w-full rounded-lg border border-slate-200 bg-white p-8 shadow-sm">
        <h1 class="text-2xl font-bold">Internal dashboard</h1>
        <p class="mt-1 text-sm text-slate-500">Authorized team accounts only.</p>
        <form method="post" class="mt-6 space-y-4">
            {% csrf_token %}
            {{ form.non_field_errors }}
            <label class="block text-sm font-semibold">Username {{ form.username }}</label>
            <label class="block text-sm font-semibold">Password {{ form.password }}</label>
            <button class="w-full rounded-md bg-indigo-700 px-4 py-2 font-semibold text-white hover:bg-indigo-600">Sign in</button>
        </form>
    </div>
</section>
{% endblock %}
