{% for field in form %}
<div>
    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
    <div style="margin-top:.35rem;">{{ field }}</div>
    {% if field.errors %}
    <p style="color:#e11d48; font-size:.75rem; margin-top:.3rem;">{{ field.errors.0 }}</p>
    {% endif %}
    {% if field.help_text %}
    <p style="color:#475569; font-size:.72rem; margin-top:.25rem;">{{ field.help_text }}</p>
    {% endif %}
</div>
{% endfor %}
